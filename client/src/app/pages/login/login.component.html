<div class="login-container">
     <h2>Login</h2>
    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required email #email="ngModel">
            <div *ngIf="email.invalid && email.touched" class="error">Valid email required</div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required #password="ngModel">
        <div *ngIf="password.invalid && password.touched" class="error">Password required</div>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">Login</button>
        <p class="mt-3 text-center"><a routerLink="/auth/register">Register</a></p>
    </form>
    <div *ngIf="errorMessage" class="error text-center mt-3">{{ errorMessage }}</div>
</div>
