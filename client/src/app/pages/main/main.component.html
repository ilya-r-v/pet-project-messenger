<div class="messenger">
  <app-chat-list
    [chats]="chats"
    [activeChatId]="activeChatId"
    (chatSelected)="onChatSelect($event)"
    (chatDeleted)="onChatDelete($event)"
    (chatCreated)="onChatCreated($event)"
  />

  @if (activeChatId && currentUser) {
    <app-chat-window
      [chatId]="activeChatId"
      [chatName]="activeChat?.name ?? ''"
      [currentUserId]="currentUser.id"
    />
  } @else {
    <div class="messenger__empty">
      <p>Выбери чат чтобы начать общение</p>
    </div>
  }

</div>
