<div class="auth">
  <div class="auth-window">
    <h4>Личный кабинет</h4>

    @if(activeForm === 'login') {
      <app-login></app-login>
    } @else {
      <app-register></app-register>
    }

    <div class="switch-buttons">
      <button class="switch-btn" [class.active]="activeForm === 'login'" (click)="showLogin()">Вход</button>
      <button class="switch-btn" [class.active]="activeForm === 'register'" (click)="showRegister()">Регистрация</button>
    </div>
  </div>
</div>
