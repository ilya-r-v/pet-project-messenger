<nav>
    <a routerLink="/" class="logo">Mes</a>
    <div class="nav-links">
        <ng-container *ngIf="authService.currentUser$ | async as user; else guest">
            <a routerLink="/main" routerLinkActive="active">Main</a>
            <a (click)="logout()" class="logout">Logout</a>
        </ng-container>
        <ng-template #guest>
            <a routerLink="auth/login" routerLinkActive="active">Login</a>
            <a routerLink="auth/register" routerLinkActive="active">Register</a>
        </ng-template>
    </div>
</nav>
