<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="fields">
        <input 
            type="text" 
            formControlName="username" 
            placeholder="Логин"
            [class.invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
        >
        <div class="error" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
        Логин обязателен
        </div>

        <input 
        type="password" 
        formControlName="password" 
        placeholder="Пароль"
        [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
        <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        Пароль обязателен
        </div>
    </div>

    <button 
        type="submit" 
        class="entrance" 
        [disabled]="loginForm.invalid"
    >
        Войти
    </button>
</form>
